version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: openclaw-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw_secret_2026
      POSTGRES_DB: openclaw_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-app
    restart: unless-stopped
    ports:
      - "6000:80"
    environment:
      DATABASE_URL: postgresql://openclaw:openclaw_secret_2026@db:5432/openclaw_manager
      JWT_SECRET: openclaw_jwt_secret_key_2026_production
      ENCRYPTION_KEY: openclaw_encryption_key_2026_32chars
      WASP_WEB_CLIENT_URL: http://localhost:6000
      WASP_SERVER_URL: http://localhost:6001
      PORT: 6001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
