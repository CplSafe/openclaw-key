version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: openclaw-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openclaw_secret_2026}
      POSTGRES_DB: openclaw_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
    container_name: openclaw-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    environment:
      DATABASE_URL: postgresql://openclaw:${DB_PASSWORD:-openclaw_secret_2026}@db:5432/openclaw_manager
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WASP_WEB_CLIENT_URL: ${API_BASE_URL:-http://localhost:3000}
      WASP_SERVER_URL: http://localhost:3001
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
